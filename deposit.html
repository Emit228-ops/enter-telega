<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пополнение - Enter Change</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
    }

    .method-selector {
      display: grid;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .method-card {
      background: var(--bg-card);
      border: 2px solid rgba(6, 182, 212, 0.2);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
    }

    .method-card.active {
      border-color: var(--accent-primary);
      background: rgba(6, 182, 212, 0.05);
    }

    .method-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
    }

    .method-info {
      flex: 1;
    }

    .method-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .method-description {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
    }

    .amount-input-wrapper {
      position: relative;
      margin-bottom: var(--spacing-lg);
    }

    .amount-input {
      width: 100%;
      padding: var(--spacing-lg);
      font-size: 32px;
      font-weight: 700;
      background: var(--bg-input);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      text-align: center;
    }

    .amount-input:focus {
      border-color: var(--accent-primary);
      outline: none;
    }

    .currency-label {
      position: absolute;
      right: var(--spacing-lg);
      top: 50%;
      transform: translateY(-50%);
      font-size: var(--font-size-lg);
      color: var(--text-secondary);
      font-weight: 600;
    }

    .quick-amounts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    .quick-amount {
      padding: var(--spacing-md);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .quick-amount:active {
      background: rgba(6, 182, 212, 0.1);
      border-color: var(--accent-primary);
    }

    .info-block {
      background: rgba(6, 182, 212, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
    }

    .info-row:last-child {
      margin-bottom: 0;
      padding-top: var(--spacing-sm);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-weight: 600;
    }

    .info-label {
      color: var(--text-secondary);
    }

    .info-value {
      color: var(--text-primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <a href="index.html" class="back-button">
      <span>←</span>
      <span>Назад</span>
    </a>

    <h1 style="font-size: 28px; margin-bottom: var(--spacing-xs);">Пополнение баланса</h1>
    <p class="text-secondary" style="margin-bottom: var(--spacing-lg);">Выберите способ пополнения</p>

    <!-- Методы пополнения -->
    <div class="method-selector">
      <a href="crypto-topup.html" class="method-card" style="text-decoration: none; color: inherit;">
        <div class="method-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path>
            <path d="M12 18V6"></path>
          </svg>
        </div>
        <div class="method-info">
          <div class="method-title">Криптовалюта</div>
          <div class="method-description">20 валют • Без комиссии</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <a href="card-topup.html" class="method-card" style="text-decoration: none; color: inherit;">
        <div class="method-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
            <line x1="1" y1="10" x2="23" y2="10"></line>
          </svg>
        </div>
        <div class="method-info">
          <div class="method-title">Перевод на карту</div>
          <div class="method-description">RUB на карту физ лица • 5% комиссия</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>
    </div>

    <!-- Информация -->
    <div class="card">
      <div style="display: flex; gap: 16px; align-items: flex-start;">
        <div style="width: 44px; height: 44px; min-width: 44px; border-radius: 50%; background: rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid rgba(255, 255, 255, 0.08);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        </div>
        <div>
          <div style="font-weight: 600; margin-bottom: 4px;">Выберите способ пополнения</div>
          <div class="text-secondary" style="font-size: 14px;">
            Криптовалюта без комиссии или перевод на карту с комиссией 5%
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Навигация -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
      </div>
      <div class="nav-label">Главная</div>
    </a>
    <a href="trading.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 14h4v7H4zM10 10h4v11h-4zM16 3h4v18h-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Трейдинг</div>
    </a>
    <a href="wallets.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
          <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
          <path d="M18 12a2 2 0 0 0 0 4h4v-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Кошелёк</div>
    </a>
    <a href="card.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </div>
      <div class="nav-label">Карта</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="nav-label">Профиль</div>
    </a>
  </nav>

  <script src="neon-background.js"></script>
  <script src="wallet-state.js"></script>
  <script>
    // Показать текущий баланс
    const totalUSD = WalletState.getTotalUSD();
    const balanceEl = document.querySelector('.back-button');
    if (balanceEl) {
      const hint = document.createElement('div');
      hint.style.cssText = 'background: rgba(6,182,212,0.08); border: 1px solid rgba(6,182,212,0.15); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;';
      hint.innerHTML = '<span style="font-size:13px; color:var(--text-secondary);">Текущий баланс</span><span style="font-weight:700; font-size:15px;">$' + WalletState.formatUSD(totalUSD) + '</span>';
      balanceEl.parentNode.insertBefore(hint, document.querySelector('.method-selector'));
    }

    // Haptic feedback
    if (window.Telegram && window.Telegram.WebApp) {
      const tg = window.Telegram.WebApp;
      document.querySelectorAll('.method-card').forEach(function(el) {
        el.addEventListener('touchstart', function() {
          if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
          }
        });
      });
    }
  </script>
</body>
</html>
