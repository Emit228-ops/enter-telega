<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конвертация - Enter Change</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
    }

    /* Конвертер */
    .converter-card {
      background: rgba(26, 31, 58, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(6, 182, 212, 0.15);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      box-shadow: 0 0 25px rgba(6, 182, 212, 0.1);
      position: relative;
    }

    .convert-side {
      margin-bottom: 0;
    }

    .convert-side-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .convert-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .coin-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 120px;
      flex-shrink: 0;
    }

    .coin-selector:active {
      border-color: var(--accent-primary);
    }

    .coin-selector-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .coin-selector-name {
      font-weight: 700;
      font-size: 15px;
      flex: 1;
    }

    .coin-selector-arrow {
      color: var(--text-muted);
      font-size: 12px;
    }

    .convert-input {
      flex: 1;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 20px;
      font-weight: 700;
      text-align: right;
      outline: none;
      min-width: 0;
      box-sizing: border-box;
    }

    .convert-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.15);
    }

    .convert-input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    .convert-input.readonly {
      background: rgba(6, 182, 212, 0.05);
      border-color: rgba(6, 182, 212, 0.15);
      color: var(--accent-primary);
    }

    .convert-balance {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .convert-balance-max {
      color: var(--accent-primary);
      cursor: pointer;
      font-weight: 600;
    }

    /* Стрелка-переключатель */
    .swap-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px 0;
      position: relative;
    }

    .swap-divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: rgba(6, 182, 212, 0.12);
    }

    .swap-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .swap-btn:active {
      transform: rotate(180deg) scale(0.9);
    }

    /* Процентные кнопки */
    .percent-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: var(--spacing-lg);
    }

    .pct-btn {
      padding: 8px;
      background: var(--bg-secondary);
      border: 1px solid rgba(6, 182, 212, 0.12);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .pct-btn:active {
      background: rgba(6, 182, 212, 0.1);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    /* Курс */
    .rate-card {
      background: rgba(6, 182, 212, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.12);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .rate-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .rate-value {
      font-weight: 700;
      font-size: 14px;
    }

    /* Кнопка */
    .convert-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
      margin-bottom: var(--spacing-lg);
    }

    .convert-btn:active {
      transform: scale(0.97);
    }

    .convert-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* Модалка выбора монеты */
    .coin-picker-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
    }

    .coin-picker-overlay.active {
      display: flex;
    }

    .coin-picker {
      background: var(--bg-primary);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: var(--spacing-lg);
      width: 100%;
      max-width: 600px;
      max-height: 70vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      border: 1px solid rgba(6, 182, 212, 0.15);
      border-bottom: none;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .coin-picker-handle {
      width: 40px;
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .coin-picker-search {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .coin-picker-search:focus {
      border-color: var(--accent-primary);
    }

    .coin-picker-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .coin-pick-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .coin-pick-item:active {
      background: rgba(6, 182, 212, 0.08);
    }

    .coin-pick-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .coin-pick-info { flex: 1; }

    .coin-pick-symbol {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 1px;
    }

    .coin-pick-name {
      font-size: 12px;
      color: var(--text-muted);
    }

    .coin-pick-balance {
      text-align: right;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Успех */
    .success-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .success-overlay.active {
      display: flex;
    }

    .success-card {
      background: var(--bg-primary);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      border: 2px solid rgba(16, 185, 129, 0.3);
    }

    .success-text {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .success-close {
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    /* История конвертаций */
    .history-section {
      margin-bottom: var(--spacing-lg);
    }

    .history-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--spacing-sm);
      font-weight: 600;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 12px;
      background: rgba(26, 31, 58, 0.85);
      border: 1px solid rgba(6, 182, 212, 0.08);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }

    .history-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .history-icon-sm {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }

    .history-arrow {
      color: var(--text-muted);
      font-size: 12px;
    }

    .history-info { flex: 1; }

    .history-pair {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .history-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .history-amounts {
      text-align: right;
    }

    .history-from {
      font-size: 13px;
      color: var(--accent-error);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .history-to {
      font-size: 13px;
      color: var(--accent-success);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <a href="wallets.html" class="back-button">
      <span>←</span>
      <span>Назад</span>
    </a>

    <h1 style="font-size: 24px; margin-bottom: var(--spacing-xs);">Конвертация</h1>
    <p class="text-secondary" style="margin-bottom: var(--spacing-lg); font-size: 14px;">Мгновенный обмен между валютами</p>

    <!-- Конвертер -->
    <div class="converter-card">
      <!-- Отдаю -->
      <div class="convert-side">
        <div class="convert-side-label">Отдаю</div>
        <div class="convert-row">
          <div class="coin-selector" id="fromSelector" onclick="openPicker('from')">
            <div class="coin-selector-icon" id="fromIcon"></div>
            <span class="coin-selector-name" id="fromName">USDT</span>
            <span class="coin-selector-arrow">▼</span>
          </div>
          <input type="number" class="convert-input" id="fromAmount" placeholder="0.00" step="any" oninput="calcTo()">
        </div>
        <div class="convert-balance">
          <span>Баланс: <span id="fromBalance">0.00</span></span>
          <span class="convert-balance-max" onclick="setMaxFrom()">Макс</span>
        </div>
      </div>

      <!-- Swap -->
      <div class="swap-divider">
        <button class="swap-btn" onclick="swapPair()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <polyline points="7 3 7 21"></polyline>
            <polyline points="3 17 7 21 11 17"></polyline>
            <polyline points="17 21 17 3"></polyline>
            <polyline points="13 7 17 3 21 7"></polyline>
          </svg>
        </button>
      </div>

      <!-- Получаю -->
      <div class="convert-side">
        <div class="convert-side-label">Получаю</div>
        <div class="convert-row">
          <div class="coin-selector" id="toSelector" onclick="openPicker('to')">
            <div class="coin-selector-icon" id="toIcon"></div>
            <span class="coin-selector-name" id="toName">BTC</span>
            <span class="coin-selector-arrow">▼</span>
          </div>
          <input type="number" class="convert-input readonly" id="toAmount" placeholder="0.00" readonly>
        </div>
        <div class="convert-balance">
          <span>Баланс: <span id="toBalance">0.00</span></span>
        </div>
      </div>
    </div>

    <!-- Процент от баланса -->
    <div class="percent-row">
      <button class="pct-btn" onclick="setPercentFrom(25)">25%</button>
      <button class="pct-btn" onclick="setPercentFrom(50)">50%</button>
      <button class="pct-btn" onclick="setPercentFrom(75)">75%</button>
      <button class="pct-btn" onclick="setPercentFrom(100)">100%</button>
    </div>

    <!-- Курс -->
    <div class="rate-card">
      <span class="rate-label">Курс обмена</span>
      <span class="rate-value" id="rateDisplay">—</span>
    </div>

    <!-- Кнопка -->
    <button class="convert-btn" id="convertBtn" disabled onclick="doConvert()">
      Конвертировать
    </button>

    <!-- История -->
    <div class="history-section">
      <div class="history-title">Последние конвертации</div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- Пикер монеты -->
  <div class="coin-picker-overlay" id="pickerOverlay" onclick="closePicker(event)">
    <div class="coin-picker">
      <div class="coin-picker-handle"></div>
      <input type="text" class="coin-picker-search" id="pickerSearch" placeholder="Поиск..." oninput="filterPicker()">
      <div class="coin-picker-list" id="pickerList"></div>
    </div>
  </div>

  <!-- Успех -->
  <div class="success-overlay" id="successOverlay" onclick="closeSuccess(event)">
    <div class="success-card">
      <div class="success-check">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="success-text">Конвертация выполнена</div>
      <div class="success-sub" id="successMsg"></div>
      <button class="success-close" onclick="closeSuccessDirect()">Готово</button>
    </div>
  </div>

  <!-- Навигация -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
      </div>
      <div class="nav-label">Главная</div>
    </a>
    <a href="trading.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 14h4v7H4zM10 10h4v11h-4zM16 3h4v18h-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Трейдинг</div>
    </a>
    <a href="wallets.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
          <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
          <path d="M18 12a2 2 0 0 0 0 4h4v-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Кошелёк</div>
    </a>
    <a href="card.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </div>
      <div class="nav-label">Карта</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="nav-label">Профиль</div>
    </a>
  </nav>

  <script src="neon-background.js"></script>
  <script src="wallet-state.js"></script>
  <script>
    let fromCoin = 'USDT';
    let toCoin = 'BTC';
    let pickerTarget = null; // 'from' или 'to'

    const COIN_SYMBOLS = {
      USDT: '₮', BTC: '₿', ETH: 'Ξ', SOL: 'S', BNB: 'B',
      XRP: 'X', DOGE: 'Ð', ADA: 'A', DOT: '●', AVAX: 'A',
      MATIC: 'M', LINK: '⬡', UNI: 'U', ATOM: '⚛', FIL: 'F',
      TRX: 'T', LTC: 'Ł', NEAR: 'N', APT: 'A', OP: 'O'
    };

    const HISTORY_KEY = 'enterchange_convert_history';

    function getRate(from, to) {
      const fromPrice = WalletState.getPrice(from);
      const toPrice = WalletState.getPrice(to);
      if (!toPrice) return 0;
      return fromPrice / toPrice;
    }

    function updateUI() {
      const fromMeta = WalletState.getCoinMeta(fromCoin);
      const toMeta = WalletState.getCoinMeta(toCoin);
      const fromBal = WalletState.getBalance(fromCoin);
      const toBal = WalletState.getBalance(toCoin);

      // From
      document.getElementById('fromIcon').style.background = fromMeta.color;
      document.getElementById('fromIcon').textContent = COIN_SYMBOLS[fromCoin] || fromCoin[0];
      document.getElementById('fromName').textContent = fromCoin;
      document.getElementById('fromBalance').textContent = WalletState.formatBalance(fromCoin, fromBal) + ' ' + fromCoin;

      // To
      document.getElementById('toIcon').style.background = toMeta.color;
      document.getElementById('toIcon').textContent = COIN_SYMBOLS[toCoin] || toCoin[0];
      document.getElementById('toName').textContent = toCoin;
      document.getElementById('toBalance').textContent = WalletState.formatBalance(toCoin, toBal) + ' ' + toCoin;

      // Курс
      const rate = getRate(fromCoin, toCoin);
      if (rate > 0) {
        const rateStr = rate >= 1
          ? '1 ' + fromCoin + ' = ' + rate.toFixed(rate >= 100 ? 2 : 6) + ' ' + toCoin
          : '1 ' + fromCoin + ' = ' + rate.toFixed(8) + ' ' + toCoin;
        document.getElementById('rateDisplay').textContent = rateStr;
      }

      calcTo();
    }

    function calcTo() {
      const fromVal = parseFloat(document.getElementById('fromAmount').value) || 0;
      const rate = getRate(fromCoin, toCoin);
      const toVal = fromVal * rate;
      const toMeta = WalletState.getCoinMeta(toCoin);

      if (fromVal > 0 && rate > 0) {
        document.getElementById('toAmount').value = toVal.toFixed(toMeta.decimals);
      } else {
        document.getElementById('toAmount').value = '';
      }

      validateBtn();
    }

    function validateBtn() {
      const fromVal = parseFloat(document.getElementById('fromAmount').value) || 0;
      const fromBal = WalletState.getBalance(fromCoin);
      const valid = fromVal > 0 && fromVal <= fromBal && fromCoin !== toCoin;
      document.getElementById('convertBtn').disabled = !valid;
    }

    function setMaxFrom() {
      const bal = WalletState.getBalance(fromCoin);
      document.getElementById('fromAmount').value = bal;
      calcTo();
    }

    function setPercentFrom(pct) {
      const bal = WalletState.getBalance(fromCoin);
      document.getElementById('fromAmount').value = (bal * pct / 100);
      calcTo();
    }

    function swapPair() {
      const tmp = fromCoin;
      fromCoin = toCoin;
      toCoin = tmp;
      document.getElementById('fromAmount').value = '';
      updateUI();

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
      }
    }

    // ===== Пикер =====
    function openPicker(target) {
      pickerTarget = target;
      document.getElementById('pickerSearch').value = '';
      renderPicker();
      document.getElementById('pickerOverlay').classList.add('active');
    }

    function closePicker(e) {
      if (e.target === document.getElementById('pickerOverlay')) {
        document.getElementById('pickerOverlay').classList.remove('active');
      }
    }

    function filterPicker() {
      renderPicker(document.getElementById('pickerSearch').value);
    }

    function renderPicker(search) {
      const coins = WalletState.getAllCoins();
      const q = (search || '').toLowerCase();
      const list = document.getElementById('pickerList');

      const filtered = coins.filter(symbol => {
        if (q) {
          const meta = WalletState.getCoinMeta(symbol);
          return symbol.toLowerCase().includes(q) || meta.name.toLowerCase().includes(q);
        }
        return true;
      });

      list.innerHTML = filtered.map(symbol => {
        const meta = WalletState.getCoinMeta(symbol);
        const bal = WalletState.getBalance(symbol);
        const sym = COIN_SYMBOLS[symbol] || symbol[0];
        return `
          <div class="coin-pick-item" onclick="pickCoin('${symbol}')">
            <div class="coin-pick-icon" style="background: ${meta.color};">${sym}</div>
            <div class="coin-pick-info">
              <div class="coin-pick-symbol">${symbol}</div>
              <div class="coin-pick-name">${meta.name}</div>
            </div>
            <div class="coin-pick-balance">${WalletState.formatBalance(symbol, bal)}</div>
          </div>
        `;
      }).join('');
    }

    function pickCoin(symbol) {
      if (pickerTarget === 'from') {
        if (symbol === toCoin) toCoin = fromCoin;
        fromCoin = symbol;
      } else {
        if (symbol === fromCoin) fromCoin = toCoin;
        toCoin = symbol;
      }
      document.getElementById('pickerOverlay').classList.remove('active');
      document.getElementById('fromAmount').value = '';
      updateUI();

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      }
    }

    // ===== Конвертация =====
    function doConvert() {
      const fromVal = parseFloat(document.getElementById('fromAmount').value) || 0;
      const rate = getRate(fromCoin, toCoin);
      const toVal = fromVal * rate;

      if (fromVal <= 0 || fromVal > WalletState.getBalance(fromCoin)) return;

      // Обновить балансы
      WalletState.subtractBalance(fromCoin, fromVal);
      WalletState.addBalance(toCoin, toVal);

      // Сохранить в историю
      saveHistory(fromCoin, toCoin, fromVal, toVal);

      // Показать успех
      const fromMeta = WalletState.getCoinMeta(fromCoin);
      const toMeta = WalletState.getCoinMeta(toCoin);
      document.getElementById('successMsg').textContent =
        fromVal.toFixed(fromMeta.decimals) + ' ' + fromCoin + ' → ' + toVal.toFixed(toMeta.decimals) + ' ' + toCoin;
      document.getElementById('successOverlay').classList.add('active');

      // Обновить UI
      document.getElementById('fromAmount').value = '';
      updateUI();
      renderHistory();

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
      }
    }

    function closeSuccess(e) {
      if (e.target === document.getElementById('successOverlay')) {
        document.getElementById('successOverlay').classList.remove('active');
      }
    }

    function closeSuccessDirect() {
      document.getElementById('successOverlay').classList.remove('active');
    }

    // ===== История =====
    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
      } catch (e) { return []; }
    }

    function saveHistory(from, to, fromAmt, toAmt) {
      const history = loadHistory();
      history.unshift({
        from, to, fromAmt, toAmt,
        date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
      });
      if (history.length > 10) history.length = 10;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function renderHistory() {
      const history = loadHistory();
      const el = document.getElementById('historyList');

      if (history.length === 0) {
        el.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px;">Нет конвертаций</div>';
        return;
      }

      el.innerHTML = history.map(h => {
        const fromMeta = WalletState.getCoinMeta(h.from);
        const toMeta = WalletState.getCoinMeta(h.to);
        const fromSym = COIN_SYMBOLS[h.from] || h.from[0];
        const toSym = COIN_SYMBOLS[h.to] || h.to[0];
        const fromDec = fromMeta ? fromMeta.decimals : 2;
        const toDec = toMeta ? toMeta.decimals : 2;
        return `
          <div class="history-item">
            <div class="history-icons">
              <div class="history-icon-sm" style="background: ${fromMeta ? fromMeta.color : '#666'};">${fromSym}</div>
              <span class="history-arrow">→</span>
              <div class="history-icon-sm" style="background: ${toMeta ? toMeta.color : '#666'};">${toSym}</div>
            </div>
            <div class="history-info">
              <div class="history-pair">${h.from} → ${h.to}</div>
              <div class="history-date">${h.date}</div>
            </div>
            <div class="history-amounts">
              <div class="history-from">−${parseFloat(h.fromAmt).toFixed(fromDec)}</div>
              <div class="history-to">+${parseFloat(h.toAmt).toFixed(toDec)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Инициализация
    updateUI();
    renderHistory();

    // Haptic
    if (window.Telegram && window.Telegram.WebApp) {
      document.addEventListener('touchstart', function(e) {
        if (e.target.closest('.coin-selector, .pct-btn, .swap-btn, .convert-btn, .coin-pick-item')) {
          if (window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
          }
        }
      });
    }
  </script>
</body>
</html>
