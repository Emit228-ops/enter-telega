<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выбор пары - Enter Change</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
    }

    .search-wrapper {
      position: relative;
      margin-bottom: var(--spacing-md);
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--bg-input);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 16px;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .filter-tabs {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .filter-tab {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid rgba(6, 182, 212, 0.15);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.08);
    }

    .filter-tab.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
    }

    .pairs-header {
      display: flex;
      padding: 0 var(--spacing-md);
      margin-bottom: var(--spacing-sm);
    }

    .pairs-header span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .pairs-header .col-pair { flex: 1; }
    .pairs-header .col-price { width: 100px; text-align: right; }
    .pairs-header .col-change { width: 80px; text-align: right; }

    .pairs-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .pair-item {
      display: flex;
      align-items: center;
      padding: var(--spacing-md);
      background: rgba(26, 31, 58, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(6, 182, 212, 0.15);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
    }

    .pair-item:active {
      transform: scale(0.98);
      border-color: var(--accent-primary);
    }

    .pair-star {
      width: 32px;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pair-star.active {
      color: #f59e0b;
    }

    .pair-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
      margin-right: var(--spacing-md);
      flex-shrink: 0;
    }

    .pair-info {
      flex: 1;
      min-width: 0;
    }

    .pair-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .pair-volume {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .pair-price-block {
      text-align: right;
      flex-shrink: 0;
    }

    .pair-price {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .pair-change {
      font-size: 13px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .pair-change.positive {
      color: var(--accent-success);
      background: rgba(16, 185, 129, 0.15);
    }

    .pair-change.negative {
      color: var(--accent-error);
      background: rgba(239, 68, 68, 0.15);
    }

    .no-results {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--text-secondary);
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <a href="trading.html" class="back-button">
      <span>←</span>
      <span>Назад</span>
    </a>

    <h1 style="font-size: 24px; margin-bottom: var(--spacing-lg);">Выбор пары</h1>

    <!-- Поиск -->
    <div class="search-wrapper">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск пары..." oninput="filterPairs()">
    </div>

    <!-- Фильтры -->
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" onclick="setFilter('all')">Все</button>
      <button class="filter-tab" onclick="setFilter('usdt')">USDT</button>
      <button class="filter-tab" onclick="setFilter('btc')">BTC</button>
      <button class="filter-tab" onclick="setFilter('fav')">★ Избранное</button>
    </div>

    <!-- Заголовок таблицы -->
    <div class="pairs-header">
      <span class="col-pair">Пара</span>
      <span class="col-price">Цена</span>
      <span class="col-change">24ч</span>
    </div>

    <!-- Список пар -->
    <div class="pairs-list" id="pairsList"></div>

    <div class="no-results" id="noResults">
      Ничего не найдено
    </div>
  </div>

  <!-- Навигация -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        </svg>
      </div>
      <div class="nav-label">Главная</div>
    </a>
    <a href="trading.html" class="nav-item active">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 14h4v7H4zM10 10h4v11h-4zM16 3h4v18h-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Трейдинг</div>
    </a>
    <a href="wallets.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path>
          <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
          <path d="M18 12a2 2 0 0 0 0 4h4v-4z"></path>
        </svg>
      </div>
      <div class="nav-label">Кошелёк</div>
    </a>
    <a href="card.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
          <line x1="1" y1="10" x2="23" y2="10"></line>
        </svg>
      </div>
      <div class="nav-label">Карта</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="nav-label">Профиль</div>
    </a>
  </nav>

  <script src="neon-background.js"></script>
  <script>
    const pairs = [
      { symbol: 'BTC/USDT', base: 'BTC', quote: 'USDT', price: 67234.50, change: 2.34, vol: '1.2B', color: '#f7931a' },
      { symbol: 'ETH/USDT', base: 'ETH', quote: 'USDT', price: 3456.78, change: 1.12, vol: '890M', color: '#627eea' },
      { symbol: 'SOL/USDT', base: 'SOL', quote: 'USDT', price: 145.23, change: -3.45, vol: '450M', color: '#9945ff' },
      { symbol: 'BNB/USDT', base: 'BNB', quote: 'USDT', price: 580.90, change: 0.56, vol: '320M', color: '#f3ba2f' },
      { symbol: 'XRP/USDT', base: 'XRP', quote: 'USDT', price: 0.6234, change: -1.23, vol: '280M', color: '#00aae4' },
      { symbol: 'DOGE/USDT', base: 'DOGE', quote: 'USDT', price: 0.1523, change: 5.67, vol: '210M', color: '#c2a633' },
      { symbol: 'ADA/USDT', base: 'ADA', quote: 'USDT', price: 0.4523, change: -0.89, vol: '180M', color: '#0033ad' },
      { symbol: 'DOT/USDT', base: 'DOT', quote: 'USDT', price: 7.23, change: 2.10, vol: '150M', color: '#e6007a' },
      { symbol: 'AVAX/USDT', base: 'AVAX', quote: 'USDT', price: 38.50, change: -2.34, vol: '130M', color: '#e84142' },
      { symbol: 'MATIC/USDT', base: 'MATIC', quote: 'USDT', price: 0.8934, change: 0.45, vol: '120M', color: '#8247e5' },
      { symbol: 'LINK/USDT', base: 'LINK', quote: 'USDT', price: 14.56, change: 3.21, vol: '95M', color: '#2a5ada' },
      { symbol: 'UNI/USDT', base: 'UNI', quote: 'USDT', price: 9.87, change: -1.56, vol: '78M', color: '#ff007a' },
      { symbol: 'ATOM/USDT', base: 'ATOM', quote: 'USDT', price: 8.45, change: 1.78, vol: '65M', color: '#2e3148' },
      { symbol: 'FIL/USDT', base: 'FIL', quote: 'USDT', price: 5.67, change: -0.34, vol: '55M', color: '#0090ff' },
      { symbol: 'ETH/BTC', base: 'ETH', quote: 'BTC', price: 0.05142, change: -1.15, vol: '45M', color: '#627eea' },
      { symbol: 'SOL/BTC', base: 'SOL', quote: 'BTC', price: 0.00216, change: -5.67, vol: '18M', color: '#9945ff' },
      { symbol: 'BNB/BTC', base: 'BNB', quote: 'BTC', price: 0.00864, change: -1.78, vol: '12M', color: '#f3ba2f' },
      { symbol: 'TRX/USDT', base: 'TRX', quote: 'USDT', price: 0.1234, change: 0.89, vol: '110M', color: '#ff0013' },
      { symbol: 'LTC/USDT', base: 'LTC', quote: 'USDT', price: 84.56, change: 1.34, vol: '88M', color: '#bfbbbb' },
      { symbol: 'NEAR/USDT', base: 'NEAR', quote: 'USDT', price: 5.12, change: 4.56, vol: '72M', color: '#00c08b' }
    ];

    let currentFilter = 'all';
    let favorites = JSON.parse(localStorage.getItem('tradingFavorites') || '[]');

    function formatPrice(price) {
      if (price >= 1000) return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (price >= 1) return price.toFixed(2);
      return price.toFixed(4);
    }

    function toggleFavorite(symbol, event) {
      event.preventDefault();
      event.stopPropagation();
      const idx = favorites.indexOf(symbol);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(symbol);
      }
      localStorage.setItem('tradingFavorites', JSON.stringify(favorites));
      renderPairs();

      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      }
    }

    function renderPairs() {
      const search = document.getElementById('searchInput').value.toUpperCase();
      const list = document.getElementById('pairsList');
      const noResults = document.getElementById('noResults');

      const filtered = pairs.filter(p => {
        if (search && !p.symbol.includes(search)) return false;
        if (currentFilter === 'usdt' && p.quote !== 'USDT') return false;
        if (currentFilter === 'btc' && p.quote !== 'BTC') return false;
        if (currentFilter === 'fav' && !favorites.includes(p.symbol)) return false;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';
      list.innerHTML = filtered.map(p => {
        const isFav = favorites.includes(p.symbol);
        const changeClass = p.change >= 0 ? 'positive' : 'negative';
        const changeSign = p.change >= 0 ? '+' : '';

        return `
          <a href="trading.html#${p.symbol.replace('/', '-')}" class="pair-item" data-symbol="${p.symbol}">
            <div class="pair-star ${isFav ? 'active' : ''}" onclick="toggleFavorite('${p.symbol}', event)">
              ${isFav ? '★' : '☆'}
            </div>
            <div class="pair-icon" style="background: ${p.color};">${p.base.charAt(0)}</div>
            <div class="pair-info">
              <div class="pair-name">${p.symbol}</div>
              <div class="pair-volume">Объём ${p.vol}</div>
            </div>
            <div class="pair-price-block">
              <div class="pair-price">${formatPrice(p.price)}</div>
              <div class="pair-change ${changeClass}">${changeSign}${p.change.toFixed(2)}%</div>
            </div>
          </a>
        `;
      }).join('');
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderPairs();
    }

    function filterPairs() {
      renderPairs();
    }

    renderPairs();

    // Haptic
    if (window.Telegram && window.Telegram.WebApp) {
      document.addEventListener('click', function(e) {
        if (e.target.closest('.pair-item') || e.target.closest('.filter-tab')) {
          if (window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
          }
        }
      });
    }
  </script>
</body>
</html>
